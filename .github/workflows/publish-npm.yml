name: "Publish Stencil ESLint Plugin"

on:
  workflow_call:
    inputs:
      version:
        description: "Version or semver bump to publish."
        required: true
        type: string
      tag:
        description: "npm dist-tag to publish under."
        required: true
        type: string
      node-version:
        description: "Node.js version used for publishing."
        required: false
        type: string
        default: "22"
      registry-url:
        description: "npm registry URL."
        required: false
        type: string
        default: "https://registry.npmjs.org"
      scope:
        description: "npm scope that should use trusted publisher auth."
        required: false
        type: string
        default: "@stencil"
      package-directory:
        description: "Directory that contains the package to publish."
        required: false
        type: string
        default: "."
      install-command:
        description: "Command used to install dependencies. Leave blank to skip."
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      install-working-directory:
        description: "Working directory for the install command."
        required: false
        type: string
        default: "."
      build-command:
        description: "Command used to build the package. Leave blank to skip."
        required: false
        type: string
        default: "pnpm run build"
      build-working-directory:
        description: "Working directory for the build command."
        required: false
        type: string
        default: "."
    outputs:
      resolved-version:
        description: "The exact semver version that was published."
        value: ${{ jobs.publish.outputs.resolved-version }}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      resolved-version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🟢 Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 🟢 Configure Node for Publish
        if: ${{ inputs.scope == '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      - name: 🟢 Configure Node for Publish (Scoped)
        if: ${{ inputs.scope != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.scope }}

      - name: 📦 Install Dependencies
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}
        shell: bash
        working-directory: ${{ inputs.install-working-directory }}

      - name: 🛠️ Build Package
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}
        shell: bash
        working-directory: ${{ inputs.build-working-directory }}

      - name: 🏷️ Set Version
        id: set-version
        run: |
          npm version --no-git-tag-version --allow-same-version ${{ inputs.version }}
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        shell: bash
        working-directory: ${{ inputs.package-directory }}

      - name: 🚀 Publish to npm
        run: npm publish --tag ${{ inputs.tag }} --provenance
        shell: bash
        working-directory: ${{ inputs.package-directory }}
