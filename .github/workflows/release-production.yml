name: "Stencil ESLint Plugin Production Release"

on:
  workflow_call:
    inputs:
      bump:
        description: "Semver bump to apply (patch, minor, major)."
        required: true
        type: string
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  validate_bump:
    name: ✅ Validate Bump Input
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Ensure bump is allowed
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          case "$BUMP" in
            patch|minor|major)
              exit 0
              ;;
            *)
              echo "::error::Invalid bump input: '$BUMP'. Allowed values: patch, minor, major."
              exit 1
              ;;
          esac

  build_eslint_plugin:
    name: 🏗️ Build ESLint Plugin
    uses: ./.github/workflows/build.yml

  publish_production:
    name: 🚀 Publish Production Build
    needs:
      - build_eslint_plugin
      - validate_bump
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: latest
      version: ${{ inputs.bump }}

  tag_and_release:
    name: 🏷️ Commit Version & Tag Release
    needs: publish_production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.publish_production.outputs.resolved-version }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔧 Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: 🏷️ Bump package.json Version
        run: npm version --no-git-tag-version --allow-same-version "$RELEASE_VERSION"
        shell: bash

      - name: 📦 Commit & Tag
        run: |
          git add package.json
          git commit -m "chore(release): v$RELEASE_VERSION"
          git tag "v$RELEASE_VERSION"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v$RELEASE_VERSION"
        shell: bash

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v$RELEASE_VERSION" --generate-notes
        shell: bash
